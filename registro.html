<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h2>Registro</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="correo" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button type="button" onclick="registro()">Registrarse</button>

    <p id="mensaje" style="text-align:center;"></p>

    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
</div>

<script>
function registro() {
    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    const mensaje = document.getElementById("mensaje");

    if (!nombre || !correo || !password) {
        mensaje.style.color = "red";
        mensaje.innerText = "⚠️ Completa todos los campos";
        return;
    }

    fetch("http://localhost:3000/api/registro", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ nombre, correo, password })
    })
    .then(res => res.json())
    .then(data => {

        console.log(data);

        if (data.error) {
            mensaje.style.color = "red";
            mensaje.innerText = data.error;
        } else {
            mensaje.style.color = "green";
            mensaje.innerText = "✅ " + data.mensaje;

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        }

    })
    .catch(error => {
        console.error(error);
        mensaje.style.color = "red";
        mensaje.innerText = "❌ Error al conectar con el servidor";
    });
}
</script>

</body>
</html>
